{% extends "base.html" %}
{% block title %}Password changed{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-lg bg-white p-8 shadow text-center">
  <h1 class="mb-3 text-xl font-bold text-emerald-800">Password updated</h1>
  <p class="mb-6 text-sm text-slate-600">
    Your password has been changed. You are still logged in.
  </p>
  <a href="{% url 'home' %}"
     class="inline-block rounded bg-sky-800 px-4 py-2 text-white hover:bg-sky-700">
    Back to the app
  </a>
</div>
{% endblock %}
