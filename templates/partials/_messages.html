{% if messages %}
  {% for message in messages %}
    <div class="mb-4 rounded border px-4 py-2
                {% if message.tags == 'error' %}border-red-300 bg-red-50 text-red-800
                {% else %}border-emerald-300 bg-emerald-50 text-emerald-800{% endif %}">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}
