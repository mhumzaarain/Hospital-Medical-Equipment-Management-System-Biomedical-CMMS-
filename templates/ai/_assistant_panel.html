{% if user.is_engineer_or_admin %}
<div class="card p-4 mt-4" x-data="{ open: false }">
  <button type="button" class="flex w-full items-center gap-2 font-semibold"
          @click="open = !open">
    <span>Assistant</span>
    <span class="text-xs text-slate-500 dark:text-slate-400" x-text="open ? 'hide' : 'show'"></span>
  </button>
  <div x-show="open" x-cloak class="mt-3">
    <div id="assistant-box-{{ equipment.pk }}"
      hx-get="{% url 'assistant_messages' equipment.pk %}{% if work_order %}?wo={{ work_order.pk }}{% endif %}"
      hx-trigger="load, every 3s"
      hx-target="this"
      hx-swap="innerHTML">
    </div>
    <form class="mt-3 flex gap-2"
          hx-post="{% url 'assistant_send' equipment.pk %}{% if work_order %}?wo={{ work_order.pk }}{% endif %}"
          hx-target="#assistant-box-{{ equipment.pk }}"
          hx-swap="innerHTML"
          hx-on::after-request="this.reset()">
      {% csrf_token %}
      <input class="input flex-1" name="content" placeholder="e.g. no oxygen error — what should I check?" required>
      <button type="submit" class="btn-primary btn-sm">Ask</button>
    </form>
  </div>
</div>
{% endif %}
